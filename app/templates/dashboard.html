{% extends "base.html" %}
{% block title %}首頁儀表板 - NikkoMusicHub{% endblock %}
{% block content %}

<div class="dashboard-grid cols-player">
  <div class="card player-console">
    <h2><span class="icon">🎛️</span>播放控制台</h2>
    <div class="player-main">
      <div class="cover">🎵</div>
      <div class="player-info">
        <div class="player-label">目前播放</div>
        <div class="track-title" id="p-track">-</div>
        <div class="volume-row">
          <span>音量</span>
          <span id="volume-val">100</span>
          <input type="range" min="0" max="150" id="volume-slider" onchange="setVolume(this.value)">
        </div>
        <div class="progress-bar"><div class="progress-fill" id="p-progress"></div></div>
        <div class="time-row">
          <span id="p-curtime">0:00</span>
          <span id="p-duration">0:00</span>
        </div>
      </div>
    </div>
    <div class="player-controls-row">
      <button class="round" onclick="toggleShuffle()" id="btn-shuffle" title="隨機播放">🔀</button>
      <button class="round" onclick="runAction(this, '/api/player/prev', null, 'dash-player-log')" title="上一首">⏮</button>
      <button class="round play success" onclick="runAction(this, '/api/player/play', null, 'dash-player-log')" title="播放 / 繼續" id="btn-play">▶</button>
      <button class="round" onclick="runAction(this, '/api/player/pause', null, 'dash-player-log')" title="暫停" id="btn-pause">⏸</button>
      <button class="round danger" onclick="runAction(this, '/api/player/stop', null, 'dash-player-log')" title="停止">⏹</button>
      <button class="round" onclick="runAction(this, '/api/player/next', null, 'dash-player-log')" title="下一首">⏭</button>
      <button class="round" onclick="runAction(this, '/api/player/reload', null, 'dash-player-log')" title="重新載入播放清單">🔄</button>
      <button class="round" onclick="toggleLoop()" id="btn-loop" title="循環播放">🔁</button>
    </div>
  </div>

  <div class="card player-settings">
    <h2><span class="icon">⚙️</span>播放設定</h2>
    <div class="form-group">
      <label class="switch-label">
        <span class="switch"><input type="checkbox" id="shuffle-toggle" onchange="toggleShuffleFromCheckbox()"><span class="slider"></span></span>
        隨機播放
      </label>
    </div>
    <div class="form-group">
      <label class="switch-label">
        <span class="switch"><input type="checkbox" id="loop-toggle" onchange="toggleLoopFromCheckbox()"><span class="slider"></span></span>
        循環播放
      </label>
    </div>
    <div class="form-group">
      <label class="switch-label">
        <span class="switch"><input type="checkbox" id="autoload-toggle" checked disabled><span class="slider"></span></span>
        重新載入播放清單
      </label>
    </div>
    <div class="metric-row"><span class="label">開機自動播放</span><span class="value" id="service-enabled">-</span></div>
    <div class="setting-buttons">
      <button onclick="runAction(this, '/api/player/enable-service', null, 'dash-player-log')">啟用開機播放</button>
      <button onclick="runAction(this, '/api/player/disable-service', null, 'dash-player-log')">停用開機播放</button>
    </div>
  </div>
</div>

<div class="dashboard-grid two-col">
  <div class="card" id="library-card">
    <div class="card-header">
      <h2><span class="icon">🎶</span>音樂庫 <span id="lib-count" class="count">0 首</span></h2>
    </div>
    <div class="form-group"><input type="text" class="search" placeholder="搜尋音樂檔案…" onkeyup="filterLibrary(this.value)"></div>
    <div id="file-list" class="list-area">
      <div class="empty-state"><div class="big-icon">⏳</div><div>載入中…</div></div>
    </div>
  </div>

  <div class="card" id="playlist-card">
    <div class="card-header">
      <h2><span class="icon">📃</span>播放清單 <span id="pl-count" class="count">0 首</span></h2>
    </div>
    <div id="playlist-output" class="list-area">
      <div class="empty-state"><div class="big-icon">⏳</div><div>載入中…</div></div>
    </div>
  </div>
</div>

<div class="card">
  <h2><span class="icon">🛠️</span>維護操作</h2>
  <div class="maintenance-row">
    <button onclick="runAction(this, '/api/system/start-player', null, 'dash-log')" title="啟動 systemd 播放器服務（開機自動播放用）">▶ 啟動播放服務</button>
    <button onclick="runAction(this, '/api/system/stop-player', null, 'dash-log')" title="停止 systemd 播放器服務">⏹ 停止播放服務</button>
    <button onclick="runAction(this, '/api/system/restart-player', null, 'dash-log')" title="重啟 systemd 播放器服務">🔄 重啟播放服務</button>
    <button onclick="runAction(this, '/api/system/rescan', null, 'dash-log')" title="重新掃描音樂庫目錄">🔍 重新掃描音樂</button>
    <button onclick="runAction(this, '/api/system/test-audio', null, 'dash-log')" title="播放測試音訊確認喇叭有聲">🔊 測試音訊輸出</button>
    <button onclick="document.getElementById('reboot-modal').classList.add('active')" class="danger" title="重新啟動 Raspberry Pi">🔴 重開機 Raspberry Pi</button>
  </div>
</div>

<div class="dashboard-grid two-col">
  <div class="card">
    <div class="card-header">
      <h2><span class="icon">📋</span>最近錯誤 / 系統 Log</h2>
      <button class="btn-sm ghost" onclick="loadRecentErrors()">更多</button>
    </div>
    <pre class="log-output" id="recent-errors">-</pre>
  </div>
  <div class="card">
    <div class="card-header">
      <h2><span class="icon">📝</span>操作紀錄</h2>
      <button class="btn-sm ghost" onclick="loadRecentErrors()">更多</button>
    </div>
    <pre class="log-output" id="dash-log">等待操作…</pre>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <h2><span class="icon">🎛️</span>播放器操作紀錄</h2>
    <button class="btn-sm ghost" onclick="refreshPlayer()">更多</button>
  </div>
  <pre class="log-output" id="dash-player-log">等待操作…</pre>
</div>

<div class="modal-overlay" id="reboot-modal">
  <div class="modal">
    <h2>確認重開機？</h2>
    <p>重開機後約 30 秒 ~ 2 分鐘服務會重新上線。</p>
    <button onclick="runAction(this, '/api/system/reboot', null, 'dash-log'); document.getElementById('reboot-modal').classList.remove('active')" class="danger">確認重開機</button>
    <button onclick="document.getElementById('reboot-modal').classList.remove('active')">取消</button>
  </div>
</div>

<script>
let currentState = {};
let libraryFiles = [];

async function refreshPlayer() {
  const s = await apiGet('/api/player/status');
  currentState = s;
  document.getElementById('p-track').textContent = s.current || '無曲目';
  document.getElementById('p-curtime').textContent = formatTime(s.position);
  document.getElementById('p-duration').textContent = formatTime(s.duration);
  document.getElementById('volume-val').textContent = s.volume;
  document.getElementById('volume-slider').value = s.volume;
  const pct = s.duration ? (s.position / s.duration * 100) : 0;
  document.getElementById('p-progress').style.width = pct + '%';

  document.getElementById('shuffle-toggle').checked = s.shuffle;
  document.getElementById('loop-toggle').checked = s.loop;
  document.getElementById('btn-shuffle').classList.toggle('active', s.shuffle);
  document.getElementById('btn-loop').classList.toggle('active', s.loop);

  const pl = await apiGet('/api/player/playlist');
  const po = document.getElementById('playlist-output');
  const plList = pl.playlist || [];
  document.getElementById('pl-count').textContent = `${plList.length} 首`;
  if (!plList.length) {
    po.innerHTML = '<div class="empty-state"><div class="big-icon">📄</div><div>播放清單為空</div><div class="hint">從音樂庫中加入歌曲</div><button onclick="runAction(this,\'/api/system/test-audio\',null,\'dash-player-log\')" style="margin-top:.5rem">測試音訊輸出</button></div>';
  } else {
    po.innerHTML = '<table class="table"><tr><th>#</th><th>曲目</th></tr>' +
      plList.map((t,i) => `<tr><td>${i+1}</td><td>${t}</td></tr>`).join('') + '</table>';
  }

  const lib = await apiGet('/api/player/library');
  libraryFiles = lib.files || [];
  renderLibrary(libraryFiles);

  const svc = await apiGet('/api/player/service-status');
  document.getElementById('service-enabled').innerHTML = statusDot(svc.enabled ? 'green' : 'gray') + (svc.enabled ? '已啟用' : '已停用');
}

function renderLibrary(files) {
  const list = document.getElementById('file-list');
  document.getElementById('lib-count').textContent = `${files.length} 首`;
  if (!files.length) {
    list.innerHTML = '<div class="empty-state"><div class="big-icon">🎵</div><div>無音樂檔案</div><div class="hint">請將 MP3 檔案上傳至音樂目錄</div><button onclick="runAction(this,\'/api/system/rescan\',null,\'dash-log\')" style="margin-top:.5rem">重新掃描音樂</button></div>';
    return;
  }
  list.innerHTML = '<table class="table"><tr><th>檔案名稱</th><th>時間</th><th>大小</th></tr>' +
    files.map(f => {
      const size = (f.size/1024/1024).toFixed(2);
      const mtime = new Date(f.mtime*1000).toLocaleString('zh-TW');
      return `<tr><td>${f.path}</td><td style="color:var(--muted);font-size:.75rem; white-space:nowrap;">${mtime}</td><td style="color:var(--muted);font-size:.75rem; white-space:nowrap;">${size} MB</td></tr>`;
    }).join('') + '</table>';
}

function filterLibrary(q) {
  const term = q.toLowerCase();
  renderLibrary(libraryFiles.filter(f => f.path.toLowerCase().includes(term)));
}

async function setVolume(v) { await apiPost('/api/player/volume', new URLSearchParams({volume:v})); refreshPlayer(); }
async function toggleShuffle() { await apiPost('/api/player/shuffle', new URLSearchParams({enabled: currentState.shuffle ? 0 : 1})); refreshPlayer(); }
async function toggleLoop() { await apiPost('/api/player/loop', new URLSearchParams({enabled: currentState.loop ? 0 : 1})); refreshPlayer(); }
async function toggleShuffleFromCheckbox() { await apiPost('/api/player/shuffle', new URLSearchParams({enabled: document.getElementById('shuffle-toggle').checked ? 1 : 0})); refreshPlayer(); }
async function toggleLoopFromCheckbox() { await apiPost('/api/player/loop', new URLSearchParams({enabled: document.getElementById('loop-toggle').checked ? 1 : 0})); refreshPlayer(); }

async function loadRecentErrors() {
  const data = await apiGet('/api/dashboard');
  document.getElementById('recent-errors').textContent = data.recent_errors || '無';
}

refreshPlayer();
loadRecentErrors();
setInterval(refreshPlayer, 3000);
setInterval(loadRecentErrors, 10000);
</script>
{% endblock %}
