{% extends "base.html" %}
{% block title %}Dashboard - NikkoMusicHub{% endblock %}
{% block content %}
<h1>Dashboard</h1>
<div class="grid">
  <div class="card">
    <h2>店家資訊</h2>
    <div class="metric"><span class="label">店名</span><span class="value" id="store-name">-</span></div>
    <div class="metric"><span class="label">Hostname</span><span class="value" id="hostname">-</span></div>
    <div class="metric"><span class="label">Tailscale IP</span><span class="value" id="tailscale-ip">-</span></div>
    <div class="metric"><span class="label">LAN IP</span><span class="value" id="lan-ip">-</span></div>
  </div>

  <div class="card">
    <h2>系統資源</h2>
    <div class="metric"><span class="label">CPU</span><span class="value" id="cpu">-</span></div>
    <div class="metric"><span class="label">RAM</span><span class="value" id="ram">-</span></div>
    <div class="metric"><span class="label">磁碟</span><span class="value" id="disk">-</span></div>
    <div class="metric"><span class="label">Uptime</span><span class="value" id="uptime">-</span></div>
  </div>

  <div class="card">
    <h2>元件狀態</h2>
    <div class="metric"><span class="label">rclone</span><span class="value" id="rclone-status">-</span></div>
    <div class="metric"><span class="label">mpv</span><span class="value" id="mpv-status">-</span></div>
    <div class="metric"><span class="label">音樂服務</span><span class="value" id="player-service">-</span></div>
    <div class="metric"><span class="label">Dropbox</span><span class="value" id="dropbox-status">-</span></div>
  </div>

  <div class="card">
    <h2>音樂與同步</h2>
    <div class="metric"><span class="label">播放狀態</span><span class="value" id="player-state">-</span></div>
    <div class="metric"><span class="label">目前曲目</span><span class="value" id="current-track" style="font-size:.85rem">-</span></div>
    <div class="metric"><span class="label">MP3 數量</span><span class="value" id="mp3-count">-</span></div>
    <div class="metric"><span class="label">最近同步</span><span class="value" id="last-sync">-</span></div>
  </div>
</div>

<div class="card">
  <h2>最近錯誤</h2>
  <pre class="log-output" id="recent-errors">-</pre>
</div>

<script>
async function loadDashboard() {
  const data = await apiGet('/api/dashboard');
  document.getElementById('store-name').textContent = data.store_name;
  document.getElementById('hostname').textContent = data.hostname;
  document.getElementById('tailscale-ip').textContent = data.tailscale_ip || '未偵測';
  document.getElementById('lan-ip').textContent = data.lan_ip || '未偵測';
  document.getElementById('cpu').innerHTML = statusDot(data.cpu_percent > 80 ? 'yellow' : 'green') + data.cpu_percent + '%';
  const ram = data.ram;
  document.getElementById('ram').innerHTML = statusDot(ram.percent > 80 ? 'yellow' : 'green') + `${ram.percent}% (${ram.used_mb}/${ram.total_mb} MB)`;
  document.getElementById('disk').innerHTML = statusDot(data.disk.percent > 85 ? 'red' : 'green') + `${data.disk.percent}% free ${data.disk.free_gb} GB`;
  document.getElementById('uptime').textContent = formatDuration(data.uptime_seconds);
  document.getElementById('rclone-status').innerHTML = statusDot(data.rclone_installed ? 'green' : 'gray') + (data.rclone_installed ? '已安裝' : '未安裝');
  document.getElementById('mpv-status').innerHTML = statusDot(data.mpv_installed ? 'green' : 'gray') + (data.mpv_installed ? '已安裝' : '未安裝');
  document.getElementById('player-service').innerHTML = statusDot(data.player_active === 'active' ? 'green' : (data.player_active === 'activating' ? 'blue' : 'gray')) + data.player_active;
  document.getElementById('dropbox-status').innerHTML = statusDot(data.dropbox_connected ? 'green' : 'gray') + (data.dropbox_connected ? '可連線' : '未連線');
  document.getElementById('player-state').innerHTML = statusDot(data.player_status === 'playing' ? 'green' : (data.player_status === 'paused' ? 'yellow' : 'gray')) + data.player_status;
  document.getElementById('current-track').textContent = data.current_track || '-';
  document.getElementById('mp3-count').textContent = data.mp3_count;
  document.getElementById('last-sync').innerHTML = (data.last_sync_at || '從未') + ' ' + (data.last_sync_status || '');
  document.getElementById('recent-errors').textContent = data.recent_errors || '無';
  document.getElementById('nav-tailscale-ip').textContent = data.tailscale_ip || data.lan_ip || '-';
  document.getElementById('nav-store-name').textContent = data.store_name;
}
loadDashboard();
setInterval(loadDashboard, 5000);
</script>
{% endblock %}
