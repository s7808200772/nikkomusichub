{% extends "base.html" %}
{% block title %}Player - NikkoMusicHub{% endblock %}
{% block content %}
<h1>Player</h1>

<div class="grid">
  <div class="card">
    <h2>播放狀態</h2>
    <div class="metric"><span class="label">狀態</span><span class="value" id="p-state">-</span></div>
    <div class="metric"><span class="label">曲目</span><span class="value" id="p-track" style="font-size:.85rem">-</span></div>
    <div class="metric"><span class="label">時間</span><span class="value" id="p-time">-</span></div>
    <div class="metric"><span class="label">音量</span><span class="value" id="p-volume">-</span></div>
  </div>

  <div class="card">
    <h2>控制</h2>
    <div class="player-controls" style="justify-content:center;">
      <button onclick="runAction(this, '/api/player/prev', null, 'player-log')" title="上一首">⏮</button>
      <button onclick="runAction(this, '/api/player/play', null, 'player-log')" class="success" title="播放" id="btn-play">▶</button>
      <button onclick="runAction(this, '/api/player/pause', null, 'player-log')" title="暫停" id="btn-pause">⏸</button>
      <button onclick="runAction(this, '/api/player/stop', null, 'player-log')" class="danger" title="停止">⏹</button>
      <button onclick="runAction(this, '/api/player/next', null, 'player-log')" title="下一首">⏭</button>
    </div>
    <div class="form-group" style="margin-top:1rem;">
      <label>音量 <span id="volume-val">-</span></label>
      <input type="range" min="0" max="150" id="volume-slider" onchange="setVolume(this.value)">
    </div>
    <div class="player-controls">
      <button onclick="toggleShuffle()" id="btn-shuffle" class="toggle">🔀 隨機</button>
      <button onclick="toggleLoop()" id="btn-loop" class="toggle">🔁 循環</button>
      <button onclick="runAction(this, '/api/player/reload', null, 'player-log')">🔄 重新載入</button>
    </div>
  </div>

  <div class="card">
    <h2>播放服務</h2>
    <div class="metric"><span class="label">開機自動播放</span><span class="value" id="service-enabled">-</span></div>
    <div class="player-controls">
      <button onclick="runAction(this, '/api/player/enable-service', null, 'player-log')">啟用開機播放</button>
      <button onclick="runAction(this, '/api/player/disable-service', null, 'player-log')">停用開機播放</button>
    </div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h2>音樂庫 <span id="lib-count" style="font-size:.85rem; color:var(--muted);">0 首</span></h2>
    <div id="file-list" style="max-height: 50vh; overflow-y: auto; font-size: .9rem;">
      <p style="color:var(--muted)">載入中…</p>
    </div>
  </div>

  <div class="card">
    <h2>播放清單</h2>
    <pre class="log-output" id="playlist-output" style="max-height: 50vh;">載入中…</pre>
  </div>
</div>

<div class="card">
  <h2>Log</h2>
  <pre class="log-output" id="player-log">等待操作…</pre>
</div>

<script>
let currentState = {};
async function refresh() {
  const s = await apiGet('/api/player/status');
  currentState = s;
  document.getElementById('p-state').innerHTML = statusDot(s.state === 'playing' ? 'green' : (s.state === 'paused' ? 'yellow' : 'gray')) + s.state;
  document.getElementById('p-track').textContent = s.current || '-';
  document.getElementById('p-time').textContent = `${formatTime(s.position)} / ${formatTime(s.duration)}`;
  document.getElementById('p-volume').textContent = s.volume;
  document.getElementById('volume-val').textContent = s.volume;
  document.getElementById('volume-slider').value = s.volume;

  document.getElementById('btn-shuffle').classList.toggle('active', s.shuffle);
  document.getElementById('btn-loop').classList.toggle('active', s.loop);

  const pl = await apiGet('/api/player/playlist');
  document.getElementById('playlist-output').textContent = JSON.stringify(pl.playlist, null, 2);

  const lib = await apiGet('/api/player/library');
  document.getElementById('lib-count').textContent = `${lib.files.length} 首`;
  const list = document.getElementById('file-list');
  if (!lib.files.length) { list.innerHTML = '<p style="color:var(--muted)">無音樂檔案</p>'; }
  else {
    list.innerHTML = '<ul>' + lib.files.map(f => `<li>${f.path} <span style="color:var(--muted)">(${(f.size/1024/1024).toFixed(2)} MB)</span></li>`).join('') + '</ul>';
  }

  const svc = await apiGet('/api/player/service-status');
  document.getElementById('service-enabled').innerHTML = statusDot(svc.enabled ? 'green' : 'gray') + (svc.enabled ? '已啟用' : '已停用');
}
async function setVolume(v) { await apiPost('/api/player/volume', new URLSearchParams({volume:v})); refresh(); }
async function toggleShuffle() { await apiPost('/api/player/shuffle', new URLSearchParams({enabled: currentState.shuffle ? 0 : 1})); refresh(); }
async function toggleLoop() { await apiPost('/api/player/loop', new URLSearchParams({enabled: currentState.loop ? 0 : 1})); refresh(); }
function formatTime(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}
refresh();
setInterval(refresh, 3000);
</script>
{% endblock %}
