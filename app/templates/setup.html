{% extends "base.html" %}
{% block title %}Setup Wizard - NikkoMusicHub{% endblock %}
{% block content %}
<h1>Setup Wizard</h1>
<p style="color: var(--muted);">請按照順序點擊按鈕完成初始化。所有執行紀錄會顯示在下方。</p>

<div class="grid">
  <div class="card">
    <h2>1. 系統更新</h2>
    <button onclick="runAction(this, '/api/setup/apt-update', null, 'setup-log')">apt update + upgrade</button>
  </div>
  <div class="card">
    <h2>2. 安裝依賴</h2>
    <button onclick="runAction(this, '/api/setup/install-rclone', null, 'setup-log')">安裝 rclone</button>
    <button onclick="runAction(this, '/api/setup/install-mpv', null, 'setup-log')" style="margin-top:.5rem">安裝 mpv</button>
  </div>
  <div class="card">
    <h2>3. 建立資料夾</h2>
    <button onclick="runAction(this, '/api/setup/create-folders', null, 'setup-log')">建立音樂資料夾</button>
  </div>
  <div class="card">
    <h2>4. Dropbox 設定</h2>
    <form id="dropbox-form" onsubmit="saveDropbox(event)">
      <div class="form-group"><label>Remote Name</label><input name="remote_name" value="dropbox" required></div>
      <div class="form-group">
        <label>Dropbox Token JSON（支援 refresh token）</label>
        <textarea name="token_json" rows="6" placeholder='{"access_token":"...","token_type":"bearer","refresh_token":"...","expiry":"2026-06-22T00:00:00Z"}'></textarea>
        <small style="color:var(--muted)">建議使用 rclone 在本機產生的 token JSON，內含 refresh_token，過期後會自動續約。<br><span id="token-status" style="color:var(--accent-2)"></span></small>
      </div>
      <div class="form-group"><label>Dropbox 音樂路徑</label><input name="dropbox_path" id="setup_dropbox_path" value="NikkoMusic" required></div>
      <div class="form-group"><label>本地音樂路徑</label><input name="local_path" id="setup_local_path" value="/srv/nikko-music/music" required></div>
      <button type="submit" class="primary">儲存 Dropbox 設定</button>
    </form>
    <button onclick="runAction(this, '/api/setup/test-dropbox', null, 'setup-log')" style="margin-top:.5rem">測試 Dropbox 連線</button>
  </div>
  <div class="card">
    <h2>5. 同步音樂</h2>
    <button onclick="runAction(this, '/api/setup/sync', null, 'setup-log')" class="success">立即同步 Dropbox</button>
  </div>
  <div class="card">
    <h2>6. 播放服務</h2>
    <button onclick="runAction(this, '/api/setup/install-service', null, 'setup-log')">重新載入 systemd</button>
    <button onclick="runAction(this, '/api/setup/enable-player', null, 'setup-log')" class="success" style="margin-top:.5rem">啟用開機自動播放</button>
    <button onclick="runAction(this, '/api/setup/disable-player', null, 'setup-log')" style="margin-top:.5rem">停用開機自動播放</button>
  </div>
</div>

<div class="card">
  <h2>執行紀錄</h2>
  <pre class="log-output" id="setup-log">等待操作…</pre>
</div>

<script>
async function loadSetupDropbox() {
  try {
    const s = await apiGet('/api/dropbox/settings');
    document.querySelector('input[name="remote_name"]').value = s.remote_name;
    document.getElementById('setup_dropbox_path').value = s.dropbox_path;
    document.getElementById('setup_local_path').value = s.local_path;
    document.getElementById('token-status').textContent = s.configured ? '✅ 已設定 Dropbox token（重新貼上可覆蓋）' : '⚠️ 尚未設定 Dropbox token';
  } catch (e) {
    document.getElementById('token-status').textContent = '無法載入設定';
  }
}
async function saveDropbox(e) {
  e.preventDefault();
  const form = e.target;
  const btn = form.querySelector('button[type="submit"]');
  const fd = new FormData(form);
  setBusy(btn, true);
  const res = await apiPost('/api/setup/dropbox', fd);
  document.getElementById('setup-log').textContent = (res.stdout || '') + '\n' + (res.stderr || '');
  showToast(res.ok ? '已儲存' : '失敗', res.ok ? 'success' : 'error');
  if (res.ok) await loadSetupDropbox();
  setBusy(btn, false);
}
loadSetupDropbox();
</script>
{% endblock %}
