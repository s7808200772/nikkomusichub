{% extends "base.html" %}
{% block title %}Setup - NikkoMusicHub{% endblock %}
{% block content %}
<h1>系統安裝</h1>
<p style="color: var(--muted);">請按照順序完成系統初始化。安裝過程中進度會即時顯示在下方。</p>

<div class="grid">
  <div class="card">
    <h2>1. 系統與依賴</h2>
    <button onclick="runAction(this, '/api/setup/apt-update', null, 'setup-log')">1-1. 系統更新 (apt update + upgrade)</button>
    <button onclick="runAction(this, '/api/setup/install-rclone', null, 'setup-log')" style="margin-top:.5rem">1-2. 安裝 rclone</button>
    <button onclick="runAction(this, '/api/setup/install-mpv', null, 'setup-log')" style="margin-top:.5rem">1-3. 安裝 mpv</button>
    <button onclick="runAction(this, '/api/setup/create-folders', null, 'setup-log')" style="margin-top:.5rem">1-4. 建立音樂資料夾</button>
  </div>

  <div class="card">
    <h2>2. 服務註冊</h2>
    <button onclick="runAction(this, '/api/setup/install-service', null, 'setup-log')">重新載入 systemd</button>
    <p style="color:var(--muted); font-size:.85rem; margin-top:.5rem;">若已用 install.sh 安裝，服務通常已經註冊好。</p>
  </div>
</div>

<div class="card">
  <h2>執行紀錄</h2>
  <pre class="log-output" id="setup-log">等待操作…</pre>
</div>

{% endblock %}
