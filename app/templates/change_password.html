{% extends "base.html" %}
{% block title %}修改密碼 - NikkoMusicHub{% endblock %}
{% block topbar_left %}<span class="page-title"><span class="icon">🔐</span>修改密碼</span>{% endblock %}
{% block sidebar_status %}{% endblock %}
{% block content %}

<div class="settings-layout">
  <div class="card settings-col-1">
    <h2><span class="icon">🔐</span>修改登入密碼</h2>
    <form id="pwd-form" onsubmit="changePassword(event)">
      <div class="form-group">
        <label>目前密碼</label>
        <div class="password-wrap">
          <input type="password" name="current" id="pwd-current" required placeholder="請輸入目前密碼">
          <button type="button" class="eye-btn" onclick="togglePwd('pwd-current', this)" title="顯示 / 隱藏密碼">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label>新密碼</label>
        <div class="password-wrap">
          <input type="password" name="new_password" id="pwd-new" required minlength="12" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*\d).{12,}" title="至少 12 個字元，且包含大寫、小寫英文字母與數字" placeholder="請輸入新密碼">
          <button type="button" class="eye-btn" onclick="togglePwd('pwd-new', this)" title="顯示 / 隱藏密碼">👁</button>
        </div>
        <div class="hint">密碼長度至少 12 個字元，且須包含大寫、小寫英文字母與數字。</div>
      </div>
      <button type="submit" class="primary block icon-left" title="修改登入密碼"><span>🔒</span> 修改密碼</button>
    </form>
    <p id="pwd-msg" style="color: var(--muted); font-size: .8rem; margin-top: .75rem;"></p>
  </div>
</div>

<script>
function togglePwd(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁'; }
}
async function changePassword(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const res = await apiPost('/api/change-password', fd);
  document.getElementById('pwd-msg').textContent = res.ok ? '密碼已修改，請重新登入。' : '修改失敗';
  showToast(res.ok ? '密碼已修改' : '修改失敗', res.ok ? 'success' : 'error');
  if (res.ok) e.target.reset();
}
</script>
{% endblock %}
