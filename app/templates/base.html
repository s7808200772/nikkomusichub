<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NikkoMusicHub{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="/" class="brand">
        <span class="brand-logo">🎵</span>
        <span class="brand-name">NikkoMusicHub</span>
      </a>
      <span class="status-pill" id="nav-system-status"><span class="dot green"></span>系統狀態：正常</span>
      <a href="/logout" class="btn btn-sm logout-mini">Logout</a>
    </div>
    <div class="topbar-center">
      <span id="nav-page-title">{% block page_title %}NikkoMusicHub{% endblock %}</span>
    </div>
    <div class="topbar-right">
      <span id="nav-store-name">-</span>
      <span class="ip-tag" id="nav-tailscale-ip">Tailscale -</span>
      <span class="ip-tag" id="nav-lan-ip">LAN -</span>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <nav>
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
          <span class="nav-icon">🏠</span>
          <span>首頁儀表</span>
        </a>
        <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">
          <span class="nav-icon">⚙️</span>
          <span>系統設定</span>
        </a>
        <a href="/logs" class="{% if request.url.path == '/logs' %}active{% endif %}">
          <span class="nav-icon">📋</span>
          <span>日誌記錄</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="/logout" class="logout-link">
          <span class="nav-icon">⏏️</span>
          <span>Logout</span>
        </a>
        <div class="sidebar-version">NikkoMusicHub v1.0.0</div>
      </div>
    </aside>

    <main class="main">
      {% block content %}{% endblock %}
    </main>

    <aside class="rightbar">
      <div class="rightbar-inner" id="right-panel">
        <div class="spinner">載入中…</div>
      </div>
    </aside>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
