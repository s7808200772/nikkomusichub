<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NikkoMusicHub{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>🎵 NikkoMusicHub</h1>
      <nav>
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">Settings</a>
        <a href="/logs" class="{% if request.url.path == '/logs' %}active{% endif %}">Logs</a>
      </nav>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-info">
          <span id="nav-store-name">-</span>
          <span class="text-muted" id="nav-tailscale-ip">-</span>
        </div>
        <a href="/logout" class="btn btn-sm">Logout</a>
      </header>
      {% block content %}{% endblock %}
    </main>
  </div>
  <div id="toast" class="toast" style="display:none;"></div>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
