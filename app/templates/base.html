<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NikkoMusicHub{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>🎵 NikkoMusicHub</h1>
      <nav>
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
        <a href="/setup" class="{% if request.url.path == '/setup' %}active{% endif %}">Setup Wizard</a>
        <a href="/dropbox" class="{% if request.url.path == '/dropbox' %}active{% endif %}">Dropbox Sync</a>
        <a href="/player" class="{% if request.url.path == '/player' %}active{% endif %}">Player Control</a>
        <a href="/music-library" class="{% if request.url.path == '/music-library' %}active{% endif %}">Music Library</a>
        <a href="/system" class="{% if request.url.path == '/system' %}active{% endif %}">System Status</a>
        <a href="/logs" class="{% if request.url.path == '/logs' %}active{% endif %}">Logs</a>
        <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">Settings</a>
        <a href="/logout">Logout</a>
      </nav>
      <div style="margin-top: 2rem; font-size: 0.8rem; color: var(--muted);">
        <div id="nav-tailscale-ip">-</div>
        <div id="nav-store-name">-</div>
      </div>
    </aside>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  <div id="toast" class="toast" style="display:none;"></div>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
