<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NikkoMusicHub{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2XoQrxeTUQyRjrOnlCoYta87iKBWq3EsdM2" crossorigin="anonymous"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      {% block topbar_left %}
      <div class="store-info">
        <span id="nav-store-name">-</span>
        <span class="ip-tag" id="nav-tailscale-ip">Tailscale -</span>
        <span class="ip-tag" id="nav-lan-ip">LAN -</span>
      </div>
      {% endblock %}
    </div>
    <div class="topbar-right">
      <span class="status-pill" id="nav-system-status"><span class="dot green"></span>系統狀態：正常</span>
      <a href="/logout" class="btn btn-sm logout-mini">登出</a>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <a href="/" class="brand" hx-get="/" hx-target="#main-content" hx-select="#main-content" hx-push-url="true">
        <span class="brand-logo">🎵</span>
        <span class="brand-name">NikkoMusicHub</span>
      </a>
      <nav>
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}" hx-get="/" hx-target="#main-content" hx-select="#main-content" hx-push-url="true">
          <span class="nav-icon">🏠</span>
          <span>首頁儀表板</span>
        </a>
        <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}" hx-get="/settings" hx-target="#main-content" hx-select="#main-content" hx-push-url="true">
          <span class="nav-icon">⚙️</span>
          <span>系統設定</span>
        </a>
        <a href="/logs" class="{% if request.url.path == '/logs' %}active{% endif %}" hx-get="/logs" hx-target="#main-content" hx-select="#main-content" hx-push-url="true">
          <span class="nav-icon">📋</span>
          <span>日誌紀錄</span>
        </a>
      </nav>

      {% block sidebar_status %}{% endblock %}

      <div class="sidebar-footer">
        <div class="device-status">
          <div class="device-icon">🥧</div>
          <div>
            <div id="sidebar-pi-model">Raspberry Pi</div>
            <div class="uptime">系統已運行 <span id="sidebar-uptime">-</span></div>
          </div>
        </div>
        <div class="status-line">
          <span class="dot green" id="sidebar-status-dot"></span>
          <span id="sidebar-status-text">正常運行</span>
        </div>
        <div class="sidebar-clock" id="sidebar-clock">-</div>
      </div>
    </aside>

    <main class="main" id="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>
  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
