{% extends "base.html" %}
{% block title %}Logs - NikkoMusicHub{% endblock %}
{% block content %}
<h1 class="page-title">📋 日誌記錄</h1>

<div class="card">
  <div style="display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem;">
    <button class="btn primary" onclick="filterLogs('all')">全部</button>
    <button class="btn outline" onclick="filterLogs('audit')">Audit</button>
    <button class="btn outline" onclick="filterLogs('sync')">Sync</button>
    <button class="btn outline" onclick="filterLogs('player')">Player</button>
  </div>

  <div style="overflow-x:auto;">
    <table class="table">
      <thead>
        <tr>
          <th style="width:90px;">類型</th>
          <th style="width:160px;">時間</th>
          <th>訊息</th>
        </tr>
      </thead>
      <tbody id="log-table">
        <tr><td colspan="3" style="color:var(--muted)">載入中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let allEntries = [];
let currentFilter = 'all';

function typeBadge(type) {
  const map = {
    audit: 'success',
    'audit-file': 'success',
    sync: 'warning',
    player: 'info',
  };
  return `<span class="badge badge-${map[type] || 'blue'}">${type}</span>`;
}

function renderLogs() {
  const tbody = document.getElementById('log-table');
  const filtered = currentFilter === 'all'
    ? allEntries
    : allEntries.filter(e => e.type === currentFilter || (currentFilter === 'audit' && e.type === 'audit-file'));
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="3" style="color:var(--muted)">無紀錄</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(e => `
    <tr>
      <td style="vertical-align:top;">${typeBadge(e.type)}</td>
      <td style="color:var(--muted); vertical-align:top; white-space:nowrap;">${e.timestamp || '-'}</td>
      <td style="vertical-align:top;">${escapeHtml(e.message)}</td>
    </tr>
  `).join('');
}

function filterLogs(type) {
  currentFilter = type;
  renderLogs();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function loadLogs() {
  const data = await apiGet('/api/logs/all');
  allEntries = data.entries || [];
  renderLogs();
}
loadLogs();
setInterval(loadLogs, 10000);
</script>
{% endblock %}
