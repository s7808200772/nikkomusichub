{% extends "base.html" %}
{% block title %}日誌紀錄 - NikkoMusicHub{% endblock %}
{% block topbar_left %}<span class="page-title"><span class="icon">📋</span>日誌紀錄</span>{% endblock %}
{% block sidebar_status %}{% endblock %}
{% block content %}

<div class="dash-grid" style="margin-bottom:1rem;">
  <div class="stat-box dash-col">
    <div class="stat-label">總日誌數</div>
    <div class="stat-value" id="stat-total">-</div>
  </div>
  <div class="stat-box dash-col">
    <div class="stat-label">今日日誌數</div>
    <div class="stat-value" id="stat-today">-</div>
  </div>
  <div class="stat-box dash-col">
    <div class="stat-label">錯誤 / 失敗</div>
    <div class="stat-value" id="stat-errors">-</div>
  </div>
  <div class="stat-box dash-col">
    <div class="stat-label">Player 事件</div>
    <div class="stat-value" id="stat-player">-</div>
  </div>
  <div class="stat-box dash-col">
    <div class="stat-label">操作紀錄</div>
    <div class="stat-value" id="stat-audit">-</div>
  </div>
  <div class="stat-box dash-col">
    <div class="stat-label">同步紀錄</div>
    <div class="stat-value" id="stat-sync">-</div>
  </div>
</div>

<div class="card" style="margin-bottom:1rem;">
  <div class="log-toolbar">
    <div class="log-tabs">
      <button class="log-tab active" onclick="setTab('all')">全部</button>
      <button class="log-tab" onclick="setTab('audit')">操作紀錄</button>
      <button class="log-tab" onclick="setTab('sync')">同步</button>
      <button class="log-tab" onclick="setTab('player')">Player</button>
    </div>
    <div class="log-filters">
      <input type="text" placeholder="搜尋訊息…" onkeyup="setSearch(this.value)">
      <select onchange="setLevel(this.value)">
        <option value="all">全部等級</option>
        <option value="error">ERROR / 失敗</option>
      </select>
      <button class="outline icon-left" onclick="exportCsv()" title="將目前日誌匯出為 CSV"><span>📥</span> 輸出 CSV</button>
      <button class="outline" onclick="loadLogs()" title="重新整理日誌">🔄</button>
    </div>
  </div>
</div>

<div class="card log-table-wrap">
  <table class="log-table" id="log-table">
    <thead>
      <tr>
        <th class="dot-cell"></th>
        <th class="type-cell">類型</th>
        <th class="time-cell">時間</th>
        <th>訊息</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="4" style="color:var(--muted); text-align:center; padding:2rem;">載入中…</td></tr>
    </tbody>
  </table>
  <div class="log-footer">
    <span id="log-summary">共 0 筆</span>
    <div class="log-pagination" id="log-pagination"></div>
  </div>
</div>

<script>
let allEntries = [];
let currentTab = 'all';
let searchTerm = '';
let levelFilter = 'all';
let currentPage = 1;
let pageSize = 50;

function typeBadge(type) {
  const map = { audit: 'blue', sync: 'warning', player: 'info' };
  return `<span class="badge badge-${map[type] || 'blue'}">${type}</span>`;
}
function typeDot(type) {
  const map = { audit: 'blue', sync: 'warning', player: 'info' };
  const color = { blue: 'var(--accent)', warning: 'var(--warning)', info: 'var(--info)' }[map[type] || 'blue'];
  return `<span class="dot" style="background:${color}; box-shadow:0 0 6px ${color};"></span>`;
}

function filterEntries() {
  let filtered = allEntries;
  if (currentTab !== 'all') {
    filtered = filtered.filter(e => (e.type || '').toLowerCase() === currentTab);
  }
  if (levelFilter === 'error') {
    filtered = filtered.filter(e => /error|failed|失敗|異常/i.test(e.message || e.raw || ''));
  }
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    filtered = filtered.filter(e => JSON.stringify(e).toLowerCase().includes(q));
  }
  filtered.sort((a, b) => {
    const ta = a.timestamp || '1970';
    const tb = b.timestamp || '1970';
    return tb.localeCompare(ta);
  });
  return filtered;
}

function renderLogs() {
  const filtered = filterEntries();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;
  const start = (currentPage - 1) * pageSize;
  const page = filtered.slice(start, start + pageSize);

  const tbody = document.querySelector('#log-table tbody');
  if (!page.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted); text-align:center; padding:2rem;">尚無紀錄</td></tr>';
  } else {
    tbody.innerHTML = page.map(e => {
      const type = e.type || 'audit';
      const time = e.timestamp || '-';
      const msg = e.message || e.raw || '-';
      return `<tr>
        <td class="dot-cell">${typeDot(type)}</td>
        <td class="type-cell">${typeBadge(type)}</td>
        <td class="time-cell">${time}</td>
        <td class="msg-cell">${escapeHtml(msg)}</td>
      </tr>`;
    }).join('');
  }
  document.getElementById('log-summary').textContent = `共 ${total} 筆`;
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const el = document.getElementById('log-pagination');
  let html = '';
  if (currentPage > 1) html += `<button class="btn-sm" onclick="goPage(${currentPage-1})">‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
      html += `<button class="btn-sm ${i === currentPage ? 'primary' : ''}" onclick="goPage(${i})">${i}</button>`;
    } else if (i === currentPage - 2 || i === currentPage + 2) {
      html += `<span style="color:var(--muted)">…</span>`;
    }
  }
  if (currentPage < totalPages) html += `<button class="btn-sm" onclick="goPage(${currentPage+1})">›</button>`;
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; renderLogs(); }
function setTab(t) {
  currentTab = t;
  currentPage = 1;
  document.querySelectorAll('.log-tab').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderLogs();
}
function setSearch(v) { searchTerm = v; currentPage = 1; renderLogs(); }
function setLevel(v) { levelFilter = v; currentPage = 1; renderLogs(); }

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function loadLogs() {
  const data = await apiGet('/api/logs/all');
  allEntries = data.entries || [];
  renderLogs();
  loadStats();
}

async function loadStats() {
  const s = await apiGet('/api/logs/stats');
  document.getElementById('stat-total').textContent = s.total;
  document.getElementById('stat-today').textContent = s.today;
  document.getElementById('stat-errors').textContent = s.errors;
  document.getElementById('stat-player').textContent = s.player;
  document.getElementById('stat-audit').textContent = s.audit;
  document.getElementById('stat-sync').textContent = s.sync;
}

function exportCsv() {
  window.open('/api/logs/export', '_blank');
}

loadLogs();
setInterval(loadLogs, 10000);
</script>
{% endblock %}
