<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NikkoMusicHub Cloud</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <div class="login-box">
    <h1>☁️ NikkoMusicHub Cloud</h1>
    <p style="color: var(--muted);">中央店點管理平台</p>
    {% if error %}
    <div style="color: var(--danger); margin-bottom: 1rem;">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="form-group">
        <label>帳號</label>
        <input type="text" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="primary" style="width:100%">登入</button>
    </form>
    <p style="font-size: 0.8rem; color: var(--muted); margin-top: 1rem;">
      預設帳號：<code>nikkolh</code> / 密碼：<code>topup30%off</code>
    </p>
  </div>
</body>
</html>
