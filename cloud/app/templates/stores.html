{% extends "base.html" %}
{% block title %}Stores - NikkoMusicHub Cloud{% endblock %}
{% block content %}
<h1>店點管理</h1>

<div class="grid">
  <div class="card">
    <h2>新增店點</h2>
    <form id="store-form" onsubmit="createStore(event)">
      <div class="form-group"><label>Store ID *</label><input name="store_id" required></div>
      <div class="form-group"><label>店名 *</label><input name="store_name" required></div>
      <div class="form-group"><label>Tailscale IP *</label><input name="tailscale_ip" placeholder="100.x.x.x" required></div>
      <div class="form-group"><label>SSH 使用者</label><input name="ssh_username" value="pi"></div>
      <div class="form-group"><label>SSH Port</label><input name="ssh_port" type="number" value="22"></div>
      <div class="form-group"><label>SSH Private Key *</label><textarea name="ssh_private_key" rows="5" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----" required></textarea></div>
      <div class="form-group"><label>Local API Key *</label><input name="local_api_key" placeholder="從 Pi 的 NIKKO_LOCAL_API_KEY 取得" required></div>
      <div class="form-group"><label>Device ID</label><input name="device_id"></div>
      <div class="form-group"><label>Hostname</label><input name="hostname"></div>
      <div class="form-group"><label>Location Note</label><input name="location_note"></div>
      <div class="form-group"><label>Music Profile</label><input name="music_profile"></div>
      <button type="submit" class="primary">新增店點</button>
    </form>
  </div>
</div>

<div class="card">
  <h2>已登錄店點</h2>
  <div id="store-list"></div>
</div>

<script>
async function loadStores() {
  const data = await apiGet('/api/stores');
  const el = document.getElementById('store-list');
  if (!data.stores.length) { el.innerHTML = '<p style="color:var(--muted)">尚無店點</p>'; return; }
  el.innerHTML = '<table><tr><th>Store ID</th><th>店名</th><th>IP</th><th>SSH User</th><th>操作</th></tr>' +
    data.stores.map(s => `<tr>
      <td>${s.store_id}</td>
      <td>${s.store_name}</td>
      <td>${s.tailscale_ip}</td>
      <td>${s.ssh_username}</td>
      <td>
        <button onclick="deleteStore('${s.store_id}', this)" class="danger">刪除</button>
        <a href="/commands?store=${s.store_id}"><button>指令</button></a>
      </td>
    </tr>`).join('') + '</table>';
}

async function createStore(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button[type="submit"]');
  const fd = new FormData(e.target);
  setBusy(btn, true);
  const res = await apiPost('/api/stores', fd);
  if (res.store_id) {
    showToast('新增成功', 'success');
    e.target.reset();
    loadStores();
  } else {
    showToast('新增失敗: ' + (res.detail || JSON.stringify(res)), 'error');
  }
  setBusy(btn, false);
}

async function deleteStore(storeId, btn) {
  if (!confirm(`確定刪除 ${storeId}？`)) return;
  setBusy(btn, true);
  const res = await apiPost(`/api/stores/${storeId}/delete`);
  showToast(res.ok ? '已刪除' : '刪除失敗', res.ok ? 'success' : 'error');
  loadStores();
  setBusy(btn, false);
}

loadStores();
</script>
{% endblock %}
